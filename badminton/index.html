<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>羽球隊公告查詢系統</title>

    <style>
        body { font-family: "Microsoft JhengHei", Arial, sans-serif; background: #f4f6f9; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #2c3e50; margin-bottom: 15px; }
        
        /* 公告樣式 */
        #announcement { 
            color: #0056b3; 
            font-weight: bold; 
            font-size: 1em; 
            margin-bottom: 20px; 
            white-space: pre-wrap; 
            line-height: 1.6;
            column-count: 2;
            column-gap: 40px;
            column-rule: 1px dashed #d1e3f8;
            text-align: left;
        }

        @media (max-width: 600px) {
            #announcement { column-count: 1; }
        }

        .controls { margin-bottom: 20px; background: #e9ecef; padding: 20px; border-radius: 8px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; }
        select, input[type="text"], input[type="datetime-local"], input[type="password"] { 
            width: 100%; padding: 12px; font-size: 16px; border-radius: 5px; border: 1px solid #ced4da; box-sizing: border-box; margin-bottom: 15px;
        }
        
        .table-responsive { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; min-width: 600px; }
        th, td { border: 1px solid #dee2e6; padding: 12px 8px; text-align: center; }
        th { background: #2c3e50; color: white; white-space: nowrap; }
        tr:nth-child(even) { background: #f8f9fa; }
        
        .no-data { text-align: center; padding: 40px; color: #6c757d; font-size: 18px; line-height: 1.6; }
        .timer-info { text-align: center; font-size: 0.9em; color: #888; margin-top: 20px; border-top: 1px dashed #ccc; padding-top: 10px; }

        /* 管理分頁樣式 */
        #adminPanel { display: none; background: #fff3cd; padding: 20px; border: 1px solid #ffeeba; border-radius: 8px; margin-top: 20px; }
        .admin-btn { background: #6c757d; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; float: right; font-size: 12px; }
        .save-btn { background: #28a745; color: white; border: none; padding: 12px 20px; border-radius: 5px; cursor: pointer; width: 100%; font-size: 16px; }
        .save-btn:hover { background: #218838; }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>

<body>

<div class="container">
    <button class="admin-btn" onclick="loginAdmin()">管理登入</button>
    <h1>羽球隊公告查詢系統</h1>
    
    <!-- 使用者頁面 -->
    <div id="userView">
        <div id="announcement">正在載入公告內容...</div>
        
        <div id="mainContent">
            <div class="controls">
                <label id="selectLabel" for="dataSelect">請選擇查詢項目：</label>
                <select id="dataSelect" disabled>
                    <option value="">檢查公告時間中...</option>
                </select>
            </div>

            <div id="resultArea" class="table-responsive">
                <div class="no-data">請先從上方選單選擇</div>
            </div>
        </div>

        <div id="timeMessage" style="display:none;"></div>
        <div class="timer-info" id="timerInfo"></div>
    </div>

    <!-- 管理頁面 -->
    <div id="adminPanel">
        <h2>系統管理設定</h2>
        <label>公告起始日期時間：</label>
        <input type="datetime-local" id="setStart">
        
        <label>公告結束日期時間：</label>
        <input type="datetime-local" id="setEnd">
        
        <label>顯示欄位範圍 (例如 A:D)：</label>
        <input type="text" id="setRange" placeholder="A:D">
        
        <label>查詢下拉選單欄位 (例如 A)：</label>
        <input type="text" id="setQueryCol" placeholder="A">

        <label>管理登入密碼：</label>
        <input type="text" id="setPwd" placeholder="目前的預設密碼">
        
        <button class="save-btn" onclick="saveSettings()">儲存設定並重新整理</button>
        <button class="admin-btn" style="float:none; margin-top:10px; background:#dc3545;" onclick="location.reload()">取消/返回</button>
    </div>
</div>

<script>
    // --- 預設配置 ---
    let config = {
        start: "2024-01-01T00:00",
        end: "2026-12-31T23:59",
        range: "A:D",      
        queryCol: "A",     
        pwd: "1234",       // 預設密碼
        csvURL: "https://docs.google.com/spreadsheets/d/e/2PACX-1vTTG5N08Vj2l_tiJM4DxAngrIx3y_xpjx1EeGjJPCExm2eGkq8JDPjf1TUCRXBYUKBUsvz0P8Asg-3C/pub?gid=1326972968&single=true&output=csv"
    };

    // 從 LocalStorage 載入設定
    function loadConfig() {
        const saved = localStorage.getItem('badmintonSettings');
        if (saved) {
            config = JSON.parse(saved);
        }
    }

    // 字母轉索引 (A -> 0, B -> 1)
    function colToIdx(col) {
        return col.toUpperCase().charCodeAt(0) - 65;
    }

    function loginAdmin() {
        const password = prompt("請輸入管理員驗證碼：");
        if (password === config.pwd) { 
            document.getElementById('userView').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
            
            // 填入目前設定值
            document.getElementById('setStart').value = config.start;
            document.getElementById('setEnd').value = config.end;
            document.getElementById('setRange').value = config.range;
            document.getElementById('setQueryCol').value = config.queryCol;
            document.getElementById('setPwd').value = config.pwd;
        } else {
            alert("驗證碼錯誤");
        }
    }

    function saveSettings() {
        config.start = document.getElementById('setStart').value;
        config.end = document.getElementById('setEnd').value;
        config.range = document.getElementById('setRange').value.toUpperCase();
        config.queryCol = document.getElementById('setQueryCol').value.toUpperCase();
        config.pwd = document.getElementById('setPwd').value;
        
        localStorage.setItem('badmintonSettings', JSON.stringify(config));
        alert("設定已儲存！");
        location.reload();
    }

    let allData = [];
    let headers = [];

    function checkTimeAndInit() {
        loadConfig();
        const now = new Date();
        const startTime = new Date(config.start);
        const endTime = new Date(config.end);

        const timerInfo = document.getElementById("timerInfo");
        // 格式化顯示時間
        const showStart = config.start.replace('T', ' ');
        const showEnd = config.end.replace('T', ' ');
        timerInfo.innerHTML = `公告查詢期間：${showStart} ~ ${showEnd}`;

        if (now < startTime) {
            showTimeMessage(`目前尚未開放查詢。<br>公告開始時間：${showStart}`);
        } else if (now > endTime) {
            showTimeMessage(`公告查詢期限已過 (${showEnd})。<br>如有疑問請洽本組。`);
        } else {
            loadData();
        }
    }

    function showTimeMessage(msg) {
        document.getElementById("mainContent").style.display = "none";
        document.getElementById("announcement").style.display = "none";
        const timeMsg = document.getElementById("timeMessage");
        timeMsg.style.display = "block";
        timeMsg.innerHTML = `<div class="no-data">${msg}</div>`;
    }

    function loadData() {
        Papa.parse(config.csvURL, {
            download: true,
            header: false, 
            skipEmptyLines: true,
            complete: function(results) {
                if (results.data.length > 0) {
                    headers = results.data[0];
                    allData = results.data.slice(1);
                    
                    document.getElementById("announcement").textContent = "羽球隊相關訊息公告";
                    renderDropdown();
                }
            },
            error: function() {
                document.getElementById("resultArea").innerHTML = "<div class='no-data' style='color:red;'>資料讀取失敗。</div>";
            }
        });
    }

    function renderDropdown() {
        const dataSelect = document.getElementById("dataSelect");
        const queryIdx = colToIdx(config.queryCol);
        
        const labelName = headers[queryIdx] || "項目";
        document.getElementById("selectLabel").textContent = `請選擇${labelName}：`;

        const options = [...new Set(allData.map(row => row[queryIdx]))].filter(c => c).sort();
        
        dataSelect.innerHTML = `<option value="">-- 請選擇 ${labelName} --</option>`;
        
        // 檢查查詢欄位標題是否包含「姓名」
        const isNameCol = labelName.includes("姓名");

        options.forEach(opt => {
            const option = document.createElement("option");
            option.value = opt;
            // 如果是姓名，則顯示遮罩過的文字，否則顯示原文字
            option.textContent = isNameCol ? maskName(opt) : opt;
            dataSelect.appendChild(option);
        });
        dataSelect.disabled = false;
    }

    document.getElementById("dataSelect").addEventListener("change", function() {
        const selectedValue = this.value;
        const resultArea = document.getElementById("resultArea");
        
        if (!selectedValue) {
            resultArea.innerHTML = '<div class="no-data">請先從上方選單選擇</div>';
            return;
        }

        const queryIdx = colToIdx(config.queryCol);
        const filtered = allData.filter(row => row[queryIdx] === selectedValue);
        
        const rangeParts = config.range.split(':');
        const startIdx = colToIdx(rangeParts[0]);
        const endIdx = (rangeParts.length > 1) ? colToIdx(rangeParts[1]) : startIdx;

        let tableHtml = `<table><thead><tr>`;
        for (let i = startIdx; i <= endIdx; i++) {
            tableHtml += `<th>${headers[i] || ""}</th>`;
        }
        tableHtml += `</tr></thead><tbody>`;
        
        filtered.forEach(row => {
            tableHtml += `<tr>`;
            for (let i = startIdx; i <= endIdx; i++) {
                let cellData = row[i] || "";
                
                // 姓名遮罩 (如果表格標題包含姓名)
                if (headers[i] && headers[i].includes("姓名")) {
                    cellData = maskName(cellData);
                }
                
                tableHtml += `<td>${cellData}</td>`;
            }
            tableHtml += `</tr>`;
        });
        
        tableHtml += '</tbody></table>';
        resultArea.innerHTML = tableHtml;
    });

    function maskName(name) {
        if (!name || name.length < 2) return name;
        if (name.length === 2) return name[0] + "○";
        return name[0] + "○" + name.substring(2);
    }

    // 初始化啟動
    checkTimeAndInit();
</script>

</body>
</html>
