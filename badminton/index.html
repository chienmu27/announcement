<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 強制瀏覽器不暫存網頁內容 -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <title>羽球隊公告查詢系統</title>

    <style>
        body { font-family: "Microsoft JhengHei", Arial, sans-serif; background: #f4f6f9; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #2c3e50; margin-bottom: 15px; }
        
        /* 公告樣式 */
        #announcement { 
            color: #0056b3; 
            font-weight: bold; 
            font-size: 1em; 
            margin-bottom: 20px; 
            white-space: pre-wrap; 
            line-height: 1.6;
            column-count: 2;
            column-gap: 40px;
            column-rule: 1px dashed #d1e3f8;
            text-align: left;
        }

        @media (max-width: 600px) {
            #announcement { column-count: 1; }
        }

        .controls { margin-bottom: 20px; background: #e9ecef; padding: 20px; border-radius: 8px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; }
        select, input[type="text"], input[type="datetime-local"], input[type="password"] { 
            width: 100%; padding: 12px; font-size: 16px; border-radius: 5px; border: 1px solid #ced4da; box-sizing: border-box; margin-bottom: 15px;
        }
        
        .table-responsive { overflow-x: auto; }
        
        /* 修改為直式表格樣式 */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; border: 1px solid #dee2e6; }
        th, td { border: 1px solid #dee2e6; padding: 12px 15px; text-align: left; }
        th { background: #2c3e50; color: white; width: 35%; white-space: nowrap; }
        td { background: white; color: #333; }
        
        /* 多筆資料時的間隔 */
        .result-block { margin-bottom: 30px; border-bottom: 3px double #2c3e50; padding-bottom: 10px; }
        .result-block:last-child { border-bottom: none; }

        .no-data { text-align: center; padding: 40px; color: #6c757d; font-size: 18px; line-height: 1.6; }
        .timer-info { text-align: center; font-size: 0.9em; color: #888; margin-top: 20px; border-top: 1px dashed #ccc; padding-top: 10px; }

        /* 管理分頁樣式 */
        #adminPanel { display: none; background: #fff3cd; padding: 20px; border: 1px solid #ffeeba; border-radius: 8px; margin-top: 20px; }
        .admin-btn { background: #6c757d; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; float: right; font-size: 12px; }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>

<body>

<!-- 登入遮罩層 -->
<div id="loginOverlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; justify-content: center; align-items: center;">
    <div style="background: white; padding: 25px; border-radius: 10px; width: 300px; text-align: center;">
        <h3>管理員登入</h3>
        <input type="password" id="adminPwdInput" placeholder="請輸入密碼" autocomplete="new-password">
        <div style="display: flex; justify-content: space-between;">
            <button onclick="closeLogin()" style="background:#6c757d; color:white; border:none; padding:10px; border-radius:5px; cursor:pointer; width:45%;">取消</button>
            <button onclick="verifyAdmin()" style="background:#007bff; color:white; border:none; padding:10px; border-radius:5px; cursor:pointer; width:45%;">登入</button>
        </div>
    </div>
</div>

<div class="container">
    <button class="admin-btn" onclick="openLogin()">管理登入</button>
    <h1>羽球隊公告查詢系統</h1>
    
    <div id="userView">
        <div id="announcement">正在連線至試算表取得設定...</div>
        
        <div id="mainContent" style="display:none;">
            <div class="controls">
                <label id="selectLabel" for="dataSelect">請選擇查詢項目：</label>
                <select id="dataSelect" disabled>
                    <option value="">載入中...</option>
                </select>
            </div>

            <div id="resultArea" class="table-responsive">
                <div class="no-data">請先從上方選單選擇</div>
            </div>
        </div>

        <div id="timeMessage" style="display:none;"></div>
        <div class="timer-info" id="timerInfo"></div>
    </div>

    <!-- 管理頁面 (僅供檢視同步狀態) -->
    <div id="adminPanel">
        <h2>系統管理設定 (已與試算表同步)</h2>
        <label>目前載入的設定：</label>
        <div id="adminConfigInfo" style="background:white; padding:15px; border-radius:5px; line-height:2;"></div>
        <button class="admin-btn" style="float:none; margin-top:20px; width:100%; padding:15px; background:#28a745;" onclick="location.reload()">重新讀取試算表資料</button>
        <button class="admin-btn" style="float:none; margin-top:10px; width:100%; padding:10px;" onclick="location.reload()">返回查詢頁面</button>
    </div>
</div>

<script>
    // --- 試算表連結配置 ---
    const SHEET_CONFIG = {
        settingsCSV: "https://docs.google.com/spreadsheets/d/e/2PACX-1vTTG5N08Vj2l_tiJM4DxAngrIx3y_xpjx1EeGjJPCExm2eGkq8JDPjf1TUCRXBYUKBUsvz0P8Asg-3C/pub?gid=727667803&single=true&output=csv",
        dataCSV: "https://docs.google.com/spreadsheets/d/e/2PACX-1vTTG5N08Vj2l_tiJM4DxAngrIx3y_xpjx1EeGjJPCExm2eGkq8JDPjf1TUCRXBYUKBUsvz0P8Asg-3C/pub?gid=1326972968&single=true&output=csv"
    };

    let config = { pwd: "", start: "", end: "", range: "", queryCol: "", msg: "" };

    function fetchSettings() {
        const url = SHEET_CONFIG.settingsCSV + "&t=" + new Date().getTime();
        Papa.parse(url, {
            download: true,
            complete: function(results) {
                const rows = results.data;
                if (rows.length >= 6) {
                    config.pwd      = rows[0][1]; 
                    config.range    = rows[1][1]; 
                    config.queryCol = rows[2][1]; 
                    config.start    = rows[3][1]; 
                    config.end      = rows[4][1]; 
                    config.msg      = rows[5][1]; 
                    checkTimeAndInit();
                }
            },
            error: function() {
                document.getElementById("announcement").innerHTML = "<span style='color:red;'>無法讀取「設定」工作表。</span>";
            }
        });
    }

    function colToIdx(col) { return col.toUpperCase().charCodeAt(0) - 65; }

    function checkTimeAndInit() {
        const now = new Date();
        const startTime = new Date(config.start);
        const endTime = new Date(config.end);
        const timerInfo = document.getElementById("timerInfo");
        const showStart = config.start.replace('T', ' ');
        const showEnd = config.end.replace('T', ' ');
        timerInfo.innerHTML = `公告查詢期間：${showStart} ~ ${showEnd}`;

        if (now < startTime) {
            showTimeMessage(`目前尚未開放查詢。<br>公告開始時間：${showStart}`);
        } else if (now > endTime) {
            showTimeMessage(`公告查詢期限已過 (${showEnd})。<br>如有疑問請洽本組。`);
        } else {
            document.getElementById("announcement").textContent = config.msg;
            document.getElementById("mainContent").style.display = "block";
            loadMainData();
        }
    }

    function showTimeMessage(msg) {
        document.getElementById("mainContent").style.display = "none";
        document.getElementById("announcement").style.display = "none";
        const timeMsg = document.getElementById("timeMessage");
        timeMsg.style.display = "block";
        timeMsg.innerHTML = `<div class="no-data">${msg}</div>`;
    }

    let allData = [];
    let headers = [];

    function loadMainData() {
        const url = SHEET_CONFIG.dataCSV + "&t=" + new Date().getTime();
        Papa.parse(url, {
            download: true,
            header: false,
            skipEmptyLines: true,
            complete: function(results) {
                if (results.data.length > 0) {
                    headers = results.data[0];
                    allData = results.data.slice(1);
                    renderDropdown();
                }
            }
        });
    }

    function renderDropdown() {
        const dataSelect = document.getElementById("dataSelect");
        const queryIdx = colToIdx(config.queryCol);
        const labelName = headers[queryIdx] || "項目";
        document.getElementById("selectLabel").textContent = `請選擇${labelName}：`;

        const options = [...new Set(allData.map(row => row[queryIdx]))].filter(c => c).sort();
        dataSelect.innerHTML = `<option value="">-- 請選擇 ${labelName} --</option>`;
        
        const isNameCol = labelName.includes("姓名");
        options.forEach(opt => {
            const option = document.createElement("option");
            option.value = opt;
            option.textContent = isNameCol ? maskName(opt) : opt;
            dataSelect.appendChild(option);
        });
        dataSelect.disabled = false;
    }

    // --- 修改此處邏輯為直式排列 ---
    document.getElementById("dataSelect").addEventListener("change", function() {
        const val = this.value;
        const resArea = document.getElementById("resultArea");
        if (!val) { resArea.innerHTML = '<div class="no-data">請先從上方選單選擇</div>'; return; }

        const qIdx = colToIdx(config.queryCol);
        const filtered = allData.filter(row => row[qIdx] === val);
        const range = config.range.split(':');
        const sIdx = colToIdx(range[0]);
        const eIdx = colToIdx(range[1]);

        let finalHtml = "";
        
        filtered.forEach(row => {
            let tableHtml = `<div class="result-block"><table><tbody>`;
            for (let i = sIdx; i <= eIdx; i++) {
                let label = headers[i] || "";
                let content = row[i] || "";
                
                // 姓名遮罩
                if (label.includes("姓名")) content = maskName(content);
                
                tableHtml += `
                    <tr>
                        <th>${label}</th>
                        <td>${content}</td>
                    </tr>`;
            }
            tableHtml += `</tbody></table></div>`;
            finalHtml += tableHtml;
        });

        resArea.innerHTML = finalHtml;
    });

    function openLogin() { 
        document.getElementById('loginOverlay').style.display = 'flex'; 
        document.getElementById('adminPwdInput').value = '';
    }
    function closeLogin() { document.getElementById('loginOverlay').style.display = 'none'; }
    
    function verifyAdmin() {
        const input = document.getElementById('adminPwdInput').value;
        if (input === config.pwd) {
            closeLogin();
            document.getElementById('userView').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
            document.getElementById('adminConfigInfo').innerHTML = `
                <b>驗證碼：</b> ******<br>
                <b>顯示範圍：</b> ${config.range}<br>
                <b>選單欄位：</b> ${config.queryCol}<br>
                <b>開始日期：</b> ${config.start}<br>
                <b>結束日期：</b> ${config.end}<br>
                <b>公告訊息：</b> ${config.msg}
            `;
        } else {
            alert("驗證碼錯誤，請輸入正確的密碼。");
            document.getElementById('adminPwdInput').value = '';
        }
    }

    function maskName(n) {
        if (!n || n.length < 2) return n;
        return n.length === 2 ? n[0] + "○" : n[0] + "○" + n.substring(2);
    }

    fetchSettings();
</script>

</body>
</html>
